<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses - EXPENSIO</title>

    <link rel="icon" href="frontend/images/icon.jpg">
    <link rel="stylesheet" href="frontend/css/base.css">
    <link rel="stylesheet" href="frontend/css/app.css">
</head>

<body>
    <div class="app-shell">

        <aside class="sidebar">
            <h2>EXPENSIO</h2>

            <ul>
                <li>
                    <a href="dashboard.html">Overview</a>
                </li>
                <li>
                    <a href="add-expenses.html">Add expense</a>
                </li>
                <li class="active">
                    <a href="view-expenses.html">All expenses</a>
                </li>
                <li>
                    <a href="reports.html">Reports</a>
                </li>
                <li>
                    <a href="profile.html">Profile</a>
                </li>
            </ul>
        </aside>

        <main class="app-main">
            <header class="page-heading">
                <div>
                    <h1>All expenses</h1>
                    <p class="subtitle">
                        Every submitted row is listed separately, ready to edit.
                    </p>
                </div>

                <a class="start-btn" href="add-expenses.html">
                    + Add expenses
                </a>
            </header>

            <section class="panel" style="max-width:none">
                <label class="sr-only" for="expense-search">
                    Search expenses
                </label>

                <input
                    id="expense-search"
                    type="search"
                    placeholder="Search by category or description"
                >

                <p id="empty-expenses" class="subtitle">
                    No saved expenses yet. Add your first batch to see it here.
                </p>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Amount</th>
                                <th>Description</th>
                                <th>Actions</th>
                            </tr>
                        </thead>

                        <tbody id="expense-list"></tbody>
                    </table>
                </div>
            </section>
        </main>

    </div>

    <script src="frontend/js/api.js"></script>
    <script src="frontend/js/view-expenses.js"></script>
</body>

</html>
