<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account - EXPENSIO</title>

    <link rel="icon" href="images/icon.jpg">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <a class="Home" href="index.html">Home</a>

    <div class="container">

        <div class="left">
            <h2 class="logo">EXPENSIO</h2>

            <h1>
                Start tracking<br>
                <span>simply.</span>
            </h1>

            <p>
                Create your account to save expenses securely in your own profile.
            </p>
        </div>

        <div class="right">
            <h1>Create account</h1>

            <p class="welcome">
                Your expenses will be private to your account.
            </p>

            <form id="register-form">

                <label for="name">Name</label>
                <input id="name" maxlength="100" required>

                <label for="email">Email</label>
                <input id="email" type="email" required>

                <label for="password">Password</label>
                <input id="password" type="password" minlength="8" required>

                <button class="login-btn" type="submit">
                    Create account
                </button>

            </form>

            <p class="auth-switch">
                Already have an account?
                <a href="login.html">Log in</a>
            </p>
        </div>

    </div>

    <script src="js/api.js"></script>
    <script src="js/register.js"></script>

</body>

</html>
