<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="frontend/images/icon.jpg">
    <link rel="stylesheet" href="frontend/css/base.css">
    <link rel="stylesheet" href="frontend/css/public.css">
</head>
<body>

    <!-- Navbar -->

    <nav>
        <div class="logo">
            <h2>EXPENSIO</h2>
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="frontend/about.html">About</a></li>
            <li><a href="frontend/contact.html">Contact</a></li>
            <li><a href="frontend/query.html">Query</a></li>
        </ul>

        <a class="login-btn" href="frontend/login.html">Login</a>
    </nav>

    <!-- Query Form -->

    <section class="query-section">

        <div class="query-box">

            <h1>Submit Your Query</h1>

            <p>
                Have a question, issue, or suggestion?
                Let us know and we'll get back to you.
            </p>

            <form>

                <input
                    type="text"
                    placeholder="Enter your name"
                    required>

                <input
                    type="email"
                    placeholder="Enter your email"
                    required>

                <select required>
                    <option value="">
                        Select Query Type
                    </option>

                    <option>
                        Technical Issue
                    </option>

                    <option>
                        Feature Request
                    </option>

                    <option>
                        Feedback
                    </option>

                    <option>
                        Other
                    </option>
                </select>

                <textarea
                    rows="6"
                    placeholder="Describe your query..."
                    required>
                </textarea>

                <button type="submit">
                    Submit Query
                </button>

            </form>

        </div>

    </section>

</body>
</html>
